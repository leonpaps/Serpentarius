# yaml-language-server: $schema=https://blue-build.org
---
name: serpentarius
description: An opinionated, clean, and highly secure immutable KDE Plasma distribution built on Universal Blue Kinoite.

# Track the pristine upstream Universal Blue KDE image
base-image: ghcr.io/ublue-os/kinoite-main
image-version: latest

# All system components must live within the modules block
modules:
  # 1. Host-Level Package Architecture and Custom Repository Integration
  - type: rpm-ostree
    repos:
      # Explicitly pass the full remote .repo definition path to the engine
      - https://fedorainfracloud.org
    install:
      - google-chrome-stable # Secure web anchor baked onto host layer
      - zsh                  # Global shell environment
      - fastfetch            # Modern desktop info layout
      - virt-manager         # Virtual Machine engine launcher
      - libvirt-daemon-kvm   # Kernel Virtual Machine supervisor
      - qemu-kvm             # Hardware emulator layers
      - docker-ce            # Container development engine
      - docker-compose-plugin # Multi-container developer utility

  # 2. Post-Installation System Initialization 
  - type: script
    scripts:
      - |
        #!/usr/bin/env bash
        set -oue pipefail
        
        # Enforce Zsh as the default system-wide user shell layout
        sed -i 's|SHELL=/bin/bash|SHELL=/bin/zsh|g' /etc/default/useradd
        
        # Securely activate low-level daemon operations
        systemctl enable libvirtd.service
        systemctl enable docker.socket
