# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
---
name: serpentarius
description: An opinionated, clean, and highly secure immutable KDE Plasma distribution built on Universal Blue Kinoite.

base-image: ghcr.io/ublue-os/kinoite-main
image-version: latest

modules:
  # 1. Copy configurations first
  - type: copy
    src: files/system/etc
    dest: /etc
  - type: copy
    src: files/system/usr
    dest: /usr

  # 2. Enable the official Google Chrome & Docker CE repositories
  - type: yum-repo
    filename: google-chrome.repo
    enabled: true
  - type: yum-repo
    filename: docker-ce.repo
    enabled: true

  # 3. Run script module
  - type: script
    scripts:
      - example.sh

  # 4. Now the packages will resolve perfectly!
  - type: rpm-ostree
    install:
      - google-chrome-stable
      - zsh
      - fastfetch
      - virt-manager
      - libvirt-daemon-kvm
      - qemu-kvm
      - docker-ce
      - docker-compose-plugin