# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: leon-atomic-gnome
description: A clean, telemetry-free GNOME desktop tailored for development and gaming on AMD hardware.

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44  # Tracks the stable Fedora release tree

modules:
  - type: files
    files:
      - source: system
        destination: /

  # 1. Base Repositories and Native Driver/Docker Layering
  - type: rpm-ostree
    repos:
      - https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-44.noarch.rpm
      - https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-44.noarch.rpm
      - https://download.docker.com/linux/fedora/docker-ce.repo
    install:
      # Codecs & Full Hardware Acceleration for Ryzen 4650U
      - mesa-va-drivers-freeworld
      - libavcodec-freeworld
      - gstreamer1-plugins-bad-freeworld
      - gstreamer1-plugins-ugly
      # Core Developer & Shell Utilities
      - zsh
      - distrobox
      # Native Docker CE Installation
      - docker-ce
      - docker-ce-cli
      - docker-buildx-plugin
      - docker-compose-plugin
    remove:
      # Removing built-in Firefox RPM in favor of clean Flathub ecosystem
      - firefox
      - firefox-langpacks

  # 2. Custom Scripts (Default User Configuration Adjustments)
  - type: script
    snippets:
      - sed -i 's/SHELL=\/bin\/bash/SHELL=\/bin\/zsh/g' /etc/default/useradd
      - groupadd -f docker
      - systemctl enable docker.service

  # 3. Native Manual Homebrew Integration (Telemetry Disabled)
  - type: brew
    brew-analytics: false
    auto-update: false
    auto-upgrade: false

  # 4. GNOME Extensions (Traditional Start Menu Layout)
  - type: gnome-extensions
    install:
      - dash-to-panel@jderose9.github.com
      - arcmenu@arcmenu.com

  # 5. Evergreen Applications & Browsers (Flatpak)
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - com.google.Chrome                 # Evergreen browser
          - com.vscodium.codium               # Telemetry-free IDE
          - com.mattjakeman.ExtensionManager  # Extension panel tweak manager
          - com.github.tchx84.Flatseal       # Sandbox permissions manager
          - com.valvesoftware.Steam           # Sandboxed Steam container for gaming

  # 6. Cryptographic Security Signing (Keep this at the bottom)
  - type: signing

  # Wallpaper
  # Custom Scripts (Default User Configuration Adjustments)
  - type: script
    snippets:
      - sed -i 's/SHELL=\/bin\/bash/SHELL=\/bin\/zsh/g' /etc/default/useradd
      - groupadd -f docker
      - systemctl enable docker.service
      # Compiles your new wallpaper schema override directly into the image layer
      - glib-compile-schemas /usr/share/glib-2.0/schemas/