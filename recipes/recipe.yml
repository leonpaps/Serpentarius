# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
---
name: serpentarius
description: An opinionated, clean, and highly secure immutable KDE Plasma distribution built on Universal Blue Kinoite.

base-image: ghcr.io/ublue-os/kinoite-main
image-version: latest
modules:
  # 1. Copy your modified /etc directory configs natively
  - type: copy
    src: files/system/etc
    dest: /etc

  # 2. Copy your branding assets, wallpapers, and presets cleanly
  - type: copy
    src: files/system/usr
    dest: /usr

  # 3. Run system configuration automation (your updated example.sh)
  - type: script
    scripts:
      - example.sh

  # 4. Host-Level Package Architecture (Baked In)
  - type: rpm-ostree
    install:
      - google-chrome-stable
      - zsh
      - fastfetch
      - virt-manager
      - libvirt-daemon-kvm
      - qemu-kvm
      - docker-ce
      - docker-compose-plugin