# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
---
name: serpentarius
description: An opinionated, clean, and highly secure immutable KDE Plasma distribution built on Universal Blue Kinoite.

base-image: ghcr.io/ublue-os/kinoite-main
image-version: latest

modules:
  # 1. Copy configurations first
  - type: copy
    src: files/system/etc
    dest: /etc
  - type: copy
    src: files/system/usr
    dest: /usr

  # 2. Inject official repository files cleanly using the modern DNF module
  - type: dnf
    repo:
      - https://download.docker.com/linux/fedora/docker-ce.repo

  # 3. Run script module
  - type: script
    scripts:
      - example.sh

  # 4. Host-Level Packages
  - type: rpm-ostree
    install:
      - zsh
      - fastfetch
      - virt-manager
      - libvirt-daemon-kvm
      - qemu-kvm
      - docker-ce
      - docker-compose-plugin
