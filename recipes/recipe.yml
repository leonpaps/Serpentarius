# yaml-language-server: $schema=https://blue-build.org
---
name: serpentarius
description: An opinionated, clean, and highly secure immutable KDE Plasma distribution built on Universal Blue Kinoite.

base-image: ghcr.io/ublue-os/kinoite-main
image-version: latest

modules:
  # 1. Run system configuration automation
  - type: script
    scripts:
      - example.sh

  # 2. Host-Level Package Architecture (Baked In)
  - type: rpm-ostree
    install:
      - google-chrome-stable
      - zsh
      - fastfetch
      - virt-manager
      - libvirt-daemon-kvm
      - qemu-kvm
      - docker-ce
      - docker-compose-plugin

  # 3. Native User-Space Homebrew Engine Tweak
  # Automates setup and triggers background upgrade timers safely
  - type: brew
    packages:
      - magic-wormhole # Automatically baked into the post-install task sheet
