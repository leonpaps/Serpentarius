# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
---
name: serpentarius
description: An opinionated, clean, and highly secure immutable KDE Plasma distribution built on Universal Blue Kinoite.

base-image: ghcr.io/ublue-os/kinoite-main
image-version: latest

modules:
  # 1. Copy your modified /etc/default/useradd and asset files into the image first
  - type: copy
    files:
      - from: system/etc
        to: /etc
      - from: system/usr
        to: /usr

  # 2. Run system configuration automation (if you kept your empty/basic example.sh)
  - type: script
    scripts:
      - example.sh

  # 3. Host-Level Package Architecture (Baked In)
  - type: rpm-ostree
    install:
      - google-chrome-stable
      - zsh
      - fastfetch
      - virt-manager
      - libvirt-daemon-kvm
      - qemu-kvm
      - docker-ce
      - docker-compose-plugin
