# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
---
name: serpentarius
description: An opinionated, clean, and highly secure immutable KDE Plasma distribution built on Universal Blue Kinoite.

base-image: ghcr.io/ublue-os/kinoite-main
image-version: latest

modules:
  # 1. Copy your desktop configurations & assets into place first
  - type: copy
    src: files/system/etc
    dest: /etc
  - type: copy
    src: files/system/usr
    dest: /usr

  # 2. THE AURORA METHOD: Inject Docker's official repository file natively
  - type: containerfile
    snippets:
      - RUN curl -Lo /etc/yum.repos.d/docker-ce.repo https://download.docker.com/linux/fedora/docker-ce.repo

  # 3. Run script module (your basic/empty safety script)
  - type: script
    scripts:
      - example.sh

  # 4. Host-Level Package Architecture (Now installs perfectly)
  - type: rpm-ostree
    install:
      - zsh
      - fastfetch
      - virt-manager
      - libvirt-daemon-kvm
      - qemu-kvm
      - docker-ce
      - docker-compose-plugin